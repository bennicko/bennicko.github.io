  <script type="application/json" id="game-player-json">{"Houston Rockets vs Los Angeles Clippers": ["Alperen Sengun", "Amen Thompson", "Ivica Zubac", "Jabari Smith Jr", "James Harden", "John Collins", "Josh Okogie", "Kawhi Leonard", "Kevin Durant", "Kris Dunn"], "Los Angeles Lakers vs San Antonio Spurs": ["Austin Reaves", "De\u0027Aaron Fox", "Deandre Ayton", "Devin Vassell", "Dylan Harper", "Gabe Vincent", "Harrison Barnes", "Jake LaRavia", "Jaxson Hayes", "Julian Champagnie", "Keldon Johnson", "LeBron James", "Luka Doncic", "Luke Kornet", "Marcus Smart", "Rui Hachimura", "Stephon Castle"], "New Orleans Pelicans vs Portland Trail Blazers": ["Deni Avdija", "Derik Queen", "Donovan Clingan", "Herb Jones", "Jerami Grant", "Jeremiah Fears", "Jose Alvarado", "Kris Murray", "Saddiq Bey", "Shaedon Sharpe", "Toumani Camara", "Trey Murphy III", "Yves Missi"], "Oklahoma City Thunder vs Phoenix Suns": ["Aaron Wiggins", "Ajay Mitchell", "Alex Caruso", "Cason Wallace", "Chet Holmgren", "Collin Gillespie", "Devin Booker", "Dillon Brooks", "Grayson Allen", "Isaiah Joe", "Jalen Williams", "Jaylin Williams", "Jordan Goodwin", "Luguentz Dort", "Mark Williams", "Oso Ighodaro", "Royce O\u0027Neale", "Ryan Dunn", "Shai Gilgeous-Alexander"], "Orlando Magic vs New York Knicks": ["Anthony Black", "Desmond Bane", "Jalen Brunson", "Jalen Suggs", "Josh Hart", "Karl-Anthony Towns", "Mikal Bridges", "OG Anunoby", "Paolo Banchero", "Wendell Carter Jr"], "Sacramento Kings vs Denver Nuggets": ["Bruce Brown", "Cameron Johnson", "DeMar DeRozan", "Dennis Schroder", "Jamal Murray", "Jonas Valanciunas", "Keegan Murray", "Maxime Raynaud", "Nikola Jokic", "Peyton Watson", "Precious Achiuwa", "Russell Westbrook", "Tim Hardaway Jr", "Zach LaVine"]}</script>
  <div id="filters-data" data-selected-player=""></div>
  <script>
    (function() {
      const gamePlayersEl = document.getElementById('game-player-json');
      const filtersData = document.getElementById('filters-data');
      const gamePlayers = gamePlayersEl ? JSON.parse(gamePlayersEl.textContent || '{}') : {};
      const gameSelect = document.getElementById('game');
      const playerSelect = document.getElementById('player');
      const selectedPlayer = filtersData ? filtersData.dataset.selectedPlayer : '';
      const ausOnlyCheckbox = document.getElementById('aus_only');
      const form = document.querySelector('.filter-form');

      function repopulatePlayers() {
        const game = gameSelect.value;
        const players = gamePlayers[game] || [];
        playerSelect.innerHTML = '';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = players.length ? 'Select a player' : 'Select a game first';
        playerSelect.appendChild(placeholder);
        players.forEach(p => {
          const opt = document.createElement('option');
          opt.value = p;
          opt.textContent = p;
          if (selectedPlayer && p === selectedPlayer) {
            opt.selected = true;
          }
          playerSelect.appendChild(opt);
        });
      }

      gameSelect.addEventListener('change', repopulatePlayers);
      repopulatePlayers();
      if (ausOnlyCheckbox && form) {
        ausOnlyCheckbox.addEventListener('change', () => form.submit());
      }
    })();
  </script>
