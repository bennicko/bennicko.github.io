<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FairOdds | Home</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
          onload="renderMathInElement(document.body, {delimiters: [{left: '$$', right: '$$', display: true}, {left: '\\\\(', right: '\\\\)', display: false}]});"></script>
</head>
<body class="body-light">
  <main class="page">
    <div class="layout">
      <aside class="card brand-card">
        <p class="eyebrow">FAIRODDS</p>
        <h1 class="brand-title">An analysis of Bookmaker Pricing for NBA Player Props</h1>
        <div class="hero-actions">
          <a class="btn btn-primary" href="{{ url_for('analyse') }}">Analyse Games</a>
          <a class="btn" href="{{ url_for('top_bets') }}">Top Bets</a>
          <a class="btn" href="{{ url_for('arbitrage') }}">Arbitrage Bets</a>
          <a class="btn" href="{{ url_for('about') }}">About</a>
        </div>
      </aside>

      <section class="card content-card">
        <h2>Welcome</h2>
        <p>Jump straight into comparing bookmaker prices or browse the analysis.</p>
        <div class="hero-actions" style="margin-top: 8px;">
          <a class="btn btn-primary" href="{{ url_for('analyse') }}">Analyse Games</a>
          <a class="btn" href="{{ url_for('top_bets') }}">Top Bets</a>
          <a class="btn" href="{{ url_for('arbitrage') }}">Arbitrage Bets</a>
          <a class="btn" href="{{ url_for('about') }}">About</a>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
